<!DOCTYPE html>

<head>

  <style>
    :root{
      --bg:#0f172a;
      --panel:#111827;
      --text:#f1f5f9;
      --muted:#94a3b8;
      --line:#1e293b;
      --accent:#3b82f6;
      --accent-2:#38bdf8;
      --radius:18px;
      --shadow:0 20px 50px rgba(0,0,0,0.28);
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.55;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{color:inherit;text-decoration:none;}

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:40px 20px 72px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      box-shadow:0 0 0 4px rgba(29,78,216,0.10);
    }

    .lang{
      font-size:0.9rem;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:8px;
      user-select:none;
    }

    .btn{
      border:1px solid var(--line);
      background:#fff;
      color:#0f172a;
      border-radius:999px;
      padding:8px 12px;
      font-size:0.9rem;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      border-color:rgba(29,78,216,0.35);
      box-shadow:0 10px 20px rgba(2,6,23,0.18);
    }

    .hero{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(29,78,216,0.05), rgba(14,165,233,0.02));
      border-radius:var(--radius);
      padding:24px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-120px;
      top:-120px;
      width:260px;
      height:260px;
      border-radius:999px;
      background:radial-gradient(circle at 30% 30%, rgba(29,78,216,0.20), transparent 60%);
      pointer-events:none;
    }

    .hero-inner{
      display:grid;
      grid-template-columns:200px 1fr;
      gap:28px;
      align-items:center;
      position:relative;
      z-index:1;
    }

    @media (max-width:700px){
      .hero-inner{grid-template-columns:1fr;}
    }

    .avatar{
      width:200px;
      height:200px;
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.18);
      box-shadow:0 20px 40px rgba(0,0,0,0.45);
      background:#eef4ff;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    h1{
      margin:0;
      font-size:2.2rem;
      letter-spacing:-0.6px;
      line-height:1.1;
    }

    .sub{
      margin-top:10px;
      color:var(--muted);
      display:flex;
      flex-wrap:wrap;
      gap:10px 14px;
      align-items:center;
      font-size:0.98rem;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      background:#ffffff;
      border:1px solid rgba(29,78,216,0.20);
      color:rgba(15,23,42,0.92);
    }

    .pill i{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--accent);
      display:inline-block;
      box-shadow:0 0 0 4px rgba(29,78,216,0.08);
    }

    .grid{
      margin-top:22px;
      display:grid;
      grid-template-columns:320px 1fr;
      gap:18px;
      align-items:start;
    }

    @media (max-width:860px){
      .grid{grid-template-columns:1fr;}
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      color:var(--text);
    }

    }

    .kicker{

    }

    .muted{color:var(--muted);}

    .facts{

    .fact{

      align-items:flex-start;

      border-radius:14px;
      border:1px solid rgba(226,232,240,0.9);

    .fact:hover{

      border-color:rgba(29,78,216,0.28);
    }

    .fact .icon{

      height:30px;

      display:grid;
      place-items:center;
      color:rgba(29,78,216,0.95);
      font-weight:700;
      font-size:0.9rem;
      flex:0 0 auto;
    }

    .fact .label{
      font-size:0.85rem;
      color:#64748b;
      margin-bottom:2px;
    }

    .fact .value{
      font-size:0.95rem;
      color:rgba(15,23,42,0.95);
      word-break:break-word;
    }

    .pills{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }

    .tag{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(59,130,246,0.32);
      background:rgba(59,130,246,0.12);
      font-size:0.88rem;

    }

    .tag:hover{
      transform:translateY(-1px);
      border-color:rgba(29,78,216,0.45);
      background:rgba(29,78,216,0.16);
    }

    .block{margin-bottom:18px;}
    .para{margin:0 0 10px; color:var(--text);}

    .job{
      padding:16px;
      border-radius:16px;
      border:1px solid rgba(226,232,240,0.20);
      background:#111827;
      transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
      margin-top:12px;

    .job:hover{
      transform:translateY(-1px);
      border-color:rgba(29,78,216,0.35);

    .job-head{

    .job-title{

    .job-meta{

    ul{margin:10px 0 0;padding-left:18px;}

    .reveal{
      opacity:0;
      transform:translateY(10px);
      transition:opacity .45s ease, transform .45s ease;
    }

    .reveal.visible{
      opacity:1;
      transform:translateY(0);
    }

    .stagger li{
      opacity:0;
      transform:translateY(6px);
    }

    .stagger.visible li{animation:rise .36s ease forwards;}
    .stagger.visible li:nth-child(1){animation-delay:.04s}
    .stagger.visible li:nth-child(2){animation-delay:.08s}
    .stagger.visible li:nth-child(3){animation-delay:.12s}
    .stagger.visible li:nth-child(4){animation-delay:.16s}
    .stagger.visible li:nth-child(5){animation-delay:.20s}
    .stagger.visible li:nth-child(6){animation-delay:.24s}
    .stagger.visible li:nth-child(7){animation-delay:.28s}
    .stagger.visible li:nth-child(8){animation-delay:.32s}

    @keyframes rise{
      to{opacity:1;transform:translateY(0);}
    }

    @media (prefers-reduced-motion: reduce){
      *{animation:none !important;transition:none !important;scroll-behavior:auto !important;}
      .reveal{opacity:1;transform:none;}
      .stagger li{opacity:1;transform:none;}
    }

    @media print{
      .btn,.top{display:none;}
      .wrap{padding:0;}
      .hero,.card{box-shadow:none;}
      body{background:#fff;color:#000;}
      .card,.hero,.job{background:#fff;color:#000;border-color:#ccc;}
      .muted,.job-meta{color:#555;}
    }
  </style>

  <script>
    let lang = 'fr';

    function applyLang(){
      document.querySelectorAll('[data-fr]').forEach(el => {
        el.textContent = el.dataset[lang];
      });
      document.getElementById('langBtn').textContent = lang.toUpperCase();
      document.documentElement.lang = lang;
    }

    document.getElementById('langBtn').addEventListener('click', () => {
      lang = (lang === 'fr') ? 'en' : 'fr';
      applyLang();
    });

    const revealEls = Array.from(document.querySelectorAll('.reveal, .stagger'));

    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          entry.target.classList.add('visible');
          if(entry.target.classList.contains('stagger')) {
            entry.target.classList.add('visible');
          }
        }
      });
    }, { threshold: 0.12 });

    revealEls.forEach(el => io.observe(el));

    applyLang();
  </script>
